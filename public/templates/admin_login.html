<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Sora:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='app-glass.css') }}">
  <script defer src="{{ url_for('static', filename='admin-login.js') }}"></script>
</head>
<body>
  <main class="shell shell-sm">
    <header class="glass topbar">
      <div>
        <p class="eyebrow">Secure Access</p>
        <h1>Admin Login</h1>
        <p class="subtle"> </p>
      </div>
      <nav class="nav-links">
        <a class="nav-pill" href="/scanner">Scanner</a>
        <a class="nav-pill" href="/dashboard">Dashboard</a>
        <a class="nav-pill" href="/report">Report</a>
        <a class="nav-pill is-active" href="/admin/login">Admin Login</a>
      </nav>
    </header>

    <section class="grid-two">
      <article class="glass card">
        <div class="card-head">
          <div>
            <p class="eyebrow"> </p>
            <h2>Camera View</h2>
          </div>
        </div>
        <div class="video-wrap">
          <img src="/video_feed" alt="Live camera stream">
        </div>
        <p class="hint" id="adminScanHint"> </p>
      </article>

      <article class="glass card">
        <div class="card-head">
          <div>
            <p class="eyebrow">Authentication</p>
            <h2>Continue as Admin</h2>
          </div>
        </div>

        <input type="hidden" id="nextUrl" value="{{ next_url }}">



        <div class="actions-row">
          <button id="openDashboardBtn" class="primary-btn" type="button">Open Dashboard</button>
          <button id="openReportBtn" class="ghost-btn" type="button">Open Report</button>
        </div>
        <p class="hint"> </p>

        <div class="divider"></div>

        <form id="adminPasswordForm" class="form-stack">
          <label>
            <span>Username</span>
            <input type="text" name="username" placeholder="Enter username" autocomplete="username" required>
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
          </label>
          <button class="ghost-btn wide-btn" type="submit">Login</button>
        </form>
        <p class="hint">2026 © admin login rights </p>
      </article>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
